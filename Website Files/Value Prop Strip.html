<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Laid Off Launchpad — Value Prop Strip</title>
  <link rel="stylesheet" href="_ds/laid-off-launchpad-design-system-621140a4-c0fe-4736-8538-e53fa50c704a/colors_and_type.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body { font-family: var(--font-sans); background: var(--bg-canvas); -webkit-font-smoothing: antialiased; }

    /* ---- Context slices (so the float reads) — not part of the section ---- */
    .ctx-hero {
      height: 300px;
      background:
        linear-gradient(180deg, rgba(26,26,26,0.55) 0%, rgba(26,26,26,0.72) 60%, rgba(26,26,26,0.86) 100%),
        url("assets/hero-image.jpg");
      background-size: cover;
      background-position: center 35%;
      position: relative;
    }
    .ctx-hero::after {
      content: "↑  Hero section";
      position: absolute; left: clamp(28px,5vw,72px); top: 28px;
      font-size: var(--fs-12); letter-spacing: var(--tracking-xwide); text-transform: uppercase;
      color: rgba(252,250,240,0.5); font-weight: 600;
    }
    .ctx-next {
      min-height: 340px;
      background: var(--bg-canvas);
      display: flex; align-items: flex-start; justify-content: center;
      padding: 96px 24px 80px;
    }
    .ctx-next .next-label {
      font-size: var(--fs-12); letter-spacing: var(--tracking-xwide); text-transform: uppercase;
      color: var(--fg-faint); font-weight: 600;
    }

    /* ---- The floating Value Prop Strip ---- */
    .strip-wrap {
      position: relative;
      z-index: 5;
      padding: 0 clamp(24px, 5vw, 72px);
      margin-top: -52px;   /* overlap hero above */
      margin-bottom: -52px; /* overlap next section below */
    }
    .strip-card {
      max-width: 1120px;
      margin: 0 auto;
      background: var(--bg-surface);
      border-radius: var(--r-lg);
      border-bottom: 4px solid var(--c-sinopia);
      /* Floating: soft shadow casts both up and down */
      box-shadow:
        0 -16px 36px -20px rgba(26,26,26,0.30),
        0 22px 48px -22px rgba(26,26,26,0.34),
        0 4px 10px -6px rgba(26,26,26,0.10);
      padding: clamp(28px, 3.4vw, 44px) clamp(32px, 4vw, 64px);
      display: grid;
      grid-template-columns: 1fr auto 1fr auto 1fr;
      align-items: center;
      gap: clamp(20px, 3vw, 48px);
    }

    .vp-item {
      display: flex;
      align-items: center;
      gap: 18px;
      justify-content: center;
    }
    .vp-check {
      flex: 0 0 auto;
      width: 40px; height: 40px;
      border-radius: var(--r-pill);
      background: var(--c-sinopia);
      display: grid; place-items: center;
      box-shadow: 0 4px 10px -4px rgba(199,62,29,0.55);
    }
    .vp-check svg { width: 21px; height: 21px; display: block; }
    .vp-text {
      font-family: var(--font-sans);
      font-weight: 700;
      font-size: clamp(1.1rem, 1.45vw, 1.4rem);
      letter-spacing: -0.01em;
      line-height: 1.15;
      color: var(--fg-ink);
      white-space: nowrap;
    }

    /* Hairline dividers between items */
    .vp-divider {
      width: 1px;
      align-self: stretch;
      margin: 6px 0;
      background: var(--line-soft);
    }

    @media (max-width: 760px) {
      .strip-card {
        grid-template-columns: 1fr;
        gap: 20px;
        justify-items: start;
      }
      .vp-item { justify-content: flex-start; }
      .vp-divider { width: 100%; height: 1px; margin: 0; }
    }
  </style>
</head>
<body>
  <!-- Context: bottom of the hero -->
  <div class="ctx-hero"></div>

  <!-- SECTION 2 — Value Prop Strip -->
  <section class="strip-wrap" data-screen-label="Value Prop Strip" aria-label="Value proposition">
    <div class="strip-card">
      <div class="vp-item">
        <span class="vp-check" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M5 12.5L10 17.5L19 7" stroke="#FCFAF0" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
        </span>
        <span class="vp-text">Apply with confidence</span>
      </div>

      <div class="vp-divider" aria-hidden="true"></div>

      <div class="vp-item">
        <span class="vp-check" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M5 12.5L10 17.5L19 7" stroke="#FCFAF0" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
        </span>
        <span class="vp-text">Trust a proven process</span>
      </div>

      <div class="vp-divider" aria-hidden="true"></div>

      <div class="vp-item">
        <span class="vp-check" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M5 12.5L10 17.5L19 7" stroke="#FCFAF0" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
        </span>
        <span class="vp-text">Land with less luck</span>
      </div>
    </div>
  </section>

  <!-- Context: top of the next section -->
  <div class="ctx-next">
    <span class="next-label">↓  Problem statement section</span>
  </div>
</body>
</html>
